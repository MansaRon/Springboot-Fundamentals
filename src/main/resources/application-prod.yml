spring:
  data:
    mongodb:
      uri: ${DB_URI}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

aws:
  s3:
    access-key: ${ACCESS}
    secret-key: ${SECRET}
    bucket-name: ${BUCKET_NAME}
    region: ${REGION}

app:
  jwt-secret: ${JWT}
  jwt-expiration-ms: 900000
  mail:
    from: ${MAIL_FROM:noreply@thendo-ecommerce.co.za}