spring:
  data:
    mongodb:
      uri: ${DB_URI}
  config:
    import: optional:file:env.properties
  application:
    name: ecommerce backend
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt-secret: ${JWT}
  jwt-expiration-ms: 86400000
  mail:
    from: ${MAIL_FROM:noreply@thendo-ecommerce.co.za}

aws:
  s3:
    access-key: ${ACCESS}
    secret-key: ${SECRET}
    bucket-name: ${BUCKET_NAME}
    region: ${REGION}

logging.level.root: info
logging.level.co.za.ecommerce: DEBUG

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 7.0.2

server:
  port: 8080