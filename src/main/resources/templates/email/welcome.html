<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #1a1a2e; padding: 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 24px; }
    .body { padding: 32px; color: #333; }
    .body h2 { color: #1a1a2e; }
    .cta { display: inline-block; margin-top: 24px; padding: 12px 28px; background: #1a1a2e; color: #fff; text-decoration: none; border-radius: 4px; font-weight: bold; }
    .footer { padding: 16px 32px; background: #f4f4f4; color: #999; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Thendo Ecommerce</h1>
  </div>
  <div class="body">
    <h2>Welcome, <span th:text="${name}">Customer</span>!</h2>
    <p>Your account has been successfully activated. You can now browse our catalogue, add items to your cart, and place orders.</p>
    <p>We're excited to have you on board.</p>
    <a class="cta" href="#">Start Shopping</a>
  </div>
  <div class="footer">
    &copy; 2026 Thendo Ecommerce. All rights reserved.
  </div>
</div>
</body>
</html>
